name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anestlink
          POSTGRES_PASSWORD: anestlink123
          POSTGRES_DB: anestlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://anestlink:anestlink123@localhost:5432/anestlink_test

      - name: Aplicar migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://anestlink:anestlink123@localhost:5432/anestlink_test

      - name: Rodar testes
        run: npm test
        env:
          DATABASE_URL: postgresql://anestlink:anestlink123@localhost:5432/anestlink_test
          JWT_ACCESS_SECRET: anestlink-access-secret-test
          JWT_REFRESH_SECRET: anestlink-refresh-secret-test
          NODE_ENV: test
          RESEND_API_KEY: re_test
          EMAIL_FROM: test@anestlink.com

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://anestlink:anestlink123@localhost:5432/anestlink_dev

      - name: Compilar TypeScript
        run: npm run build

      - name: Build Docker
        run: docker build -t anestlink-api .