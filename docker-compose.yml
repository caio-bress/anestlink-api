services:
  postgres:
    image: postgres:16-alpine
    container_name: anestlink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: anestlink
      POSTGRES_PASSWORD: anestlink123
      POSTGRES_DB: anestlink_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anestlink -d anestlink_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: anestlink-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://anestlink:anestlink123@postgres:5432/anestlink_dev
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: